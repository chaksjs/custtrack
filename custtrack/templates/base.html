<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>rpt-sampler — BTP Customer Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: '72', 'Segoe UI', Arial, sans-serif; background: #f5f6f7; color: #32363a; }

    /* Top Bar */
    .topbar {
      background: #0a6ed1;
      color: #fff;
      padding: 0 24px;
      height: 48px;
      display: flex;
      align-items: center;
      gap: 0;
      box-shadow: 0 2px 4px rgba(0,0,0,.15);
    }
    .topbar .brand {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: .3px;
      margin-right: 32px;
      white-space: nowrap;
    }
    .topbar nav { display: flex; gap: 4px; flex: 1; }
    .topbar nav a {
      color: rgba(255,255,255,.85);
      text-decoration: none;
      font-size: 14px;
      padding: 0 14px;
      height: 48px;
      display: flex;
      align-items: center;
      border-bottom: 3px solid transparent;
      transition: all .15s;
    }
    .topbar nav a:hover { color: #fff; background: rgba(255,255,255,.1); }
    .topbar nav a.active { color: #fff; border-bottom-color: #fff; }
    .topbar .export-btn {
      margin-left: auto;
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.3);
      color: #fff;
      padding: 5px 14px;
      border-radius: 4px;
      font-size: 13px;
      text-decoration: none;
      cursor: pointer;
      transition: background .15s;
    }
    .topbar .export-btn:hover { background: rgba(255,255,255,.25); }

    /* Page */
    .page { max-width: 1200px; margin: 24px auto; padding: 0 20px; }
    .page-title { font-size: 18px; font-weight: 600; color: #32363a; margin-bottom: 16px; }

    /* Flash messages */
    .flash { padding: 10px 16px; border-radius: 4px; margin-bottom: 16px; font-size: 14px; }
    .flash-success { background: #f1fdf6; color: #107e3e; border: 1px solid #abe2c0; }
    .flash-error   { background: #fdf4f4; color: #bb0000; border: 1px solid #f5b8b8; }
    .flash-info    { background: #eef4fd; color: #0a6ed1; border: 1px solid #b3d0f5; }

    /* Cards */
    .card {
      background: #fff;
      border: 1px solid #d9d9d9;
      border-radius: 6px;
      padding: 20px 24px;
      margin-bottom: 16px;
    }
    .card-title { font-size: 14px; font-weight: 600; color: #6a6d70; margin-bottom: 14px; text-transform: uppercase; letter-spacing: .4px; }

    /* Form */
    .form-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 4px; }
    .form-group { flex: 1; min-width: 160px; margin-bottom: 10px; }
    .form-group label { display: block; font-size: 12px; font-weight: 600; color: #6a6d70; margin-bottom: 4px; }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #89919a;
      border-radius: 4px;
      font-size: 14px;
      color: #32363a;
      background: #fff;
      transition: border-color .15s;
    }
    .form-group input:focus,
    .form-group select:focus { outline: none; border-color: #0a6ed1; box-shadow: 0 0 0 2px rgba(10,110,209,.15); }

    /* Buttons */
    .btn { padding: 7px 16px; border: none; border-radius: 4px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all .15s; }
    .btn-primary { background: #0a6ed1; color: #fff; }
    .btn-primary:hover { background: #085db5; }
    .btn-ghost { background: transparent; color: #0a6ed1; border: 1px solid #0a6ed1; }
    .btn-ghost:hover { background: #eef4fd; }
    .btn-negative { background: #bb0000; color: #fff; }
    .btn-negative:hover { background: #a20000; }
    .btn-sm { padding: 4px 10px; font-size: 12px; }

    /* Table */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th {
      background: #f5f6f7;
      border-bottom: 2px solid #d9d9d9;
      padding: 9px 12px;
      text-align: left;
      font-size: 12px;
      font-weight: 700;
      color: #6a6d70;
      text-transform: uppercase;
      letter-spacing: .3px;
      white-space: nowrap;
    }
    tbody td { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
    tbody tr:hover td { background: #f5f9ff; }
    tbody tr:last-child td { border-bottom: none; }

    /* Status badges */
    .status {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .3px;
    }
    .status-active   { background: #f1fdf6; color: #107e3e; border: 1px solid #abe2c0; }
    .status-archived { background: #fdf4f4; color: #bb0000; border: 1px solid #f5b8b8; }

    /* Connection dot */
    .conn-dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; margin-right: 6px; vertical-align: middle; }
    .conn-ok  { background: #107e3e; }
    .conn-err { background: #bb0000; }

    /* Password reveal */
    .pw-field-wrap { position: relative; }
    .pw-field-wrap input { padding-right: 72px; }
    .pw-reveal-btn {
      position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
      background: #f5f6f7; border: 1px solid #d9d9d9; border-radius: 3px;
      padding: 2px 8px; font-size: 11px; cursor: pointer; color: #32363a;
    }
    .pw-reveal-btn:hover { background: #e8e8e8; }

    /* Modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.45); z-index: 200;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff; border-radius: 6px;
      padding: 24px 28px; width: 580px; max-width: 95vw;
      box-shadow: 0 8px 32px rgba(0,0,0,.2);
    }
    .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 18px; color: #32363a; }
    .modal-footer { display: flex; gap: 10px; margin-top: 12px; }

    /* Empty state */
    .empty { text-align: center; padding: 40px 20px; color: #89919a; font-size: 14px; }
    .empty-icon { font-size: 36px; margin-bottom: 10px; }
  </style>
</head>
<body>

<div class="topbar">
  <span class="brand">🗂 rpt-sampler</span>
  <nav>
    <a href="/" class="{{ 'active' if active_page == 'home' else '' }}">Customers</a>
    <a href="/settings" class="{{ 'active' if active_page == 'settings' else '' }}">⚙ Settings</a>
  </nav>
  <a href="/export" class="export-btn">📥 Export Excel</a>
</div>

<div class="page">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="flash flash-{{ cat }}">{{ msg }}</div>
    {% endfor %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

</body>
</html>
